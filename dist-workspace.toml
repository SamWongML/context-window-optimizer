# cargo-dist release configuration
# Docs: https://github.com/axodotdev/cargo-dist

# Point dist at the Cargo package in this directory.
[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc"]
# CI backends to support
ci = "github"
# Where to host releases
hosting = "github"
# Whether dist should create a Github Release or use an existing draft
create-release = true
# Checksums to generate for each App
checksum = "sha256"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Features to pass to cargo build
features = ["full"]
# Whether default-features should be enabled with cargo build
default-features = false
# Whether +crt-static should be used on msvc
msvc-crt-static = true
# Whether to install an updater program
install-updater = false
# Path that installers should place binaries in
install-path = "CARGO_HOME"
